<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивная навигация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
        }
        
        .nav-menu li {
            text-align: center;
        }
        
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 12px;
            background-color: #34495e;
            border-radius: 5px;
            display: block;
            transition: all 0.3s;
        }
        
        .nav-menu a:hover {
            background-color: #e74c3c;
            transform: translateX(5px);
        }
        
        @media (min-width: 768px) {
            .navbar {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 15px 40px;
            }
            
            .logo {
                text-align: left;
            }
            
            .nav-menu {
                flex-direction: row;
                gap: 20px;
            }
            
            .nav-menu a {
                padding: 8px 16px;
                background-color: transparent;
            }
            
            .nav-menu a:hover {
                background-color: #e74c3c;
                transform: translateY(-2px);
            }
        }
        
        .content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        .note {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .note ul {
            margin-left: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Company</div>
        <ul class="nav-menu">
            <li><a href="#">Главная</a></li>
            <li><a href="#">О нас</a></li>
            <li><a href="#">Услуги</a></li>
            <li><a href="#">Портфолио</a></li>
            <li><a href="#">Контакты</a></li>
        </ul>
    </nav>
    
    <main class="content">
        <h1>Адаптивная навигация</h1>
        <div class="note">
            <p><strong>Требования выполнены:</strong></p>
            <ul>
                <li>На мобильных (< 768px): вертикальное меню</li>
                <li>На планшетах и десктопах (≥ 768px): горизонтальное меню</li>
                <li>Добавлены hover-эффекты</li>
                <li>Использован gap для отступов</li>
            </ul>
        </div>
    </main>
</body>
</html>
